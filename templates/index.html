<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Service Chatbot</title>
    <!-- Flask URL routing for static files -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
</head>
<body>
    <div class="background-animation">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="chat-wrapper">
        <header class="chat-header">
            <div class="header-info">
                <div class="avatar">
                    <i class="fa-solid fa-robot"></i>
                    <span class="status-dot"></span>
                </div>
                <div>
                    <h1>SupportBot</h1>
                    <p>Online</p>
                </div>
            </div>
            <button class="options-btn"><i class="fa-solid fa-ellipsis-vertical"></i></button>
        </header>

        <section class="chat-body" id="chatBody">
            <div class="message bot-message">
                <div class="message-content markdown-body">
                    Hello! I am a Machine Learning powered assistant. How can I help you today?
                </div>
                <!-- Time will be generated dynamically normally, static HTML gets 'Just now' -->
                <div class="timestamp">Just now</div>
            </div>
        </section>

        <div class="typing-indicator" id="typingIndicator">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

        <footer class="chat-footer">
            <form id="chatForm">
                <div class="input-group">
                    <input type="text" id="userInput" placeholder="Ask me something..." autocomplete="off">
                    <button type="submit" id="sendBtn"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </form>
        </footer>
    </main>

    <!-- Flask URL routing for static files -->
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
